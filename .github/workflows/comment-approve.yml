# 中文：当评论 issue 被加上 comment:approved 标签时，把它写成 content/comments 下的文件并提交，触发网站重建。
# English: When a comment issue gets the comment:approved label, write it into content/comments and commit, which rebuilds the site.
# Caveat / 注意：本工作流只在添加 comment:approved 标签时运行；拒绝评论只需关闭 issue，不会触及公开网站。
# Caveat: This runs only on the comment:approved label; rejecting a comment just means closing the issue and never touches the public site.
name: Approve comment

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write
  actions: write # lets this workflow dispatch the Pages deploy (see last step)

jobs:
  approve:
    if: github.event.label.name == 'comment:approved'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Materialize approved comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const path = require("path");

            const issue = context.payload.issue;
            const match = issue.body.match(/```json\s*([\s\S]*?)```/);
            if (!match) {
              core.setFailed("No JSON payload found in the issue body.");
              return;
            }
            const data = JSON.parse(match[1]);

            const slugify = (value) =>
              String(value).toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "") || "anon";
            const id = `${data.date}-${slugify(data.name)}-${issue.number}`;
            const collection = data.collection === "works" ? "works" : "writings";

            const comment = {
              collection,
              slug: data.slug,
              name: data.name,
              date: data.date,
              body: data.body,
              author: false,
            };
            if (data.replyTo) comment.replyTo = data.replyTo;

            // 图片：从 pending 分支取回，写入 public/images/comments，并设置 image 字段。
            // Image: fetch from the pending branch, write under public/images/comments, set the image field.
            if (data.imagePath) {
              const pendingBranch = process.env.PENDING_BRANCH || "comment-pending";
              const ext = path.extname(data.imagePath) || ".jpg";
              // 注意：Contents API 对 >1MB 文件返回空 content（encoding "none"）；
              // 先用它拿 sha，再用 Blobs API（支持到 100MB）取真正内容，避免写出 0 字节文件。
              // Note: the Contents API returns empty content for files >1MB (encoding "none").
              // Use it only for the sha, then fetch the real bytes via the Blobs API (up to 100MB),
              // otherwise large images get written as 0-byte files.
              const meta = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: data.imagePath,
                ref: pendingBranch,
              });
              const blob = await github.rest.git.getBlob({
                owner: context.repo.owner,
                repo: context.repo.repo,
                file_sha: meta.data.sha,
              });
              const buffer = Buffer.from(blob.data.content, blob.data.encoding);
              const imageDir = path.join("public", "images", "comments");
              fs.mkdirSync(imageDir, { recursive: true });
              const imageFile = path.join(imageDir, `${id}${ext}`);
              fs.writeFileSync(imageFile, buffer);
              comment.image = `/images/comments/${id}${ext}`;
              comment.imageAlt = `Image attached by ${data.name}.`;
            }

            const dir = path.join("content", "comments", collection, data.slug);
            fs.mkdirSync(dir, { recursive: true });
            fs.writeFileSync(
              path.join(dir, `${id}.json`),
              JSON.stringify(comment, null, 2) + "\n",
            );

            core.exportVariable("COMMENT_ID", id);

      - name: Commit approved comment
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/comments public/images/comments 2>/dev/null || git add content/comments
          git commit -m "Publish approved comment ${COMMENT_ID}"
          git push

      - name: Mark issue published
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              labels: ["comment:published"],
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              state: "closed",
            });

      # 中文：本工作流用内置 GITHUB_TOKEN 提交，push 不会触发部署工作流（GitHub 防递归）。
      # 用 workflow_dispatch 显式触发部署——这是 GITHUB_TOKEN 唯一能触发的事件例外。
      # English: This workflow commits with the built-in GITHUB_TOKEN, and such pushes do NOT
      # trigger other workflows (GitHub's anti-recursion rule). workflow_dispatch is the one
      # event GITHUB_TOKEN can trigger, so dispatch the Pages deploy explicitly.
      - name: Trigger Pages deploy
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy-pages.yml --ref main
