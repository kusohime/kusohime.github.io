# 中文：在 main 分支更新时构建 Astro，并发布到 GitHub Pages。
# English: Builds Astro and deploys it to GitHub Pages whenever main changes.
# Caveat / 注意：首次使用时需要在 GitHub 仓库 Settings > Pages 中选择 GitHub Actions。
# Caveat: On first use, select GitHub Actions under repository Settings > Pages.
name: Deploy website to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check website
        run: npm run check

      - name: Build website
        run: npm run build

      - name: Remove local-only Studio from published files
        shell: bash
        run: |
          rm -rf dist/admin
          find dist/_astro -type f -name '*.js' -print0 |
            xargs -0 grep -l 'yixin-cui-studio-passcode' |
            xargs -r rm -f

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload website
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
