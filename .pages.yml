# 中文：Pages CMS 配置——让你可以在任何设备上用 GitHub 账号登录、在线编辑作品与文章。
# English: Pages CMS config — lets you log in with GitHub from any device and edit
# works and writings online. Saving commits to this repo and your existing
# .github/workflows/deploy-pages.yml rebuilds yixincui.com.
# Caveat / 注意：字段必须与 src/content.config.ts 的 schema 保持一致，否则构建会失败。
# Caveat: Fields must match the schema in src/content.config.ts, or the build fails.
# 语言：本站为英文 + 中文两种语言。
# Languages: this site is English + Chinese (two languages).

# 图片库：上传到 public/images，网址前缀为 /images（与 frontmatter 中的 image 一致）。
# Media library: uploads land in public/images, served under /images.
media:
  input: public/images
  output: /images

content:
  # 首页正文：紧跟姓名的简介，以及可替换的图片与说明，按语言分别填写。
  # Home page: the intro that follows the name, plus a swappable image and caption.
  - name: home
    label: Home page / 首页
    type: file
    path: src/config/homeContent.json
    format: json
    fields:
      - name: intro
        label: Intro — continues after your name
        description: >-
          Free text. Continues the sentence after your name (e.g. "studies
          composition…"). Use [text](https://link) for a link, *text* for italics,
          **text** for bold, and a blank line to start a new paragraph.
        type: object
        fields:
          - { name: en, label: English, type: text, options: { rows: 6 } }
          - { name: zh, label: 中文, type: text, options: { rows: 6 } }
      # 首页图片：可上传或挑选 public/images 中的图片；显示时裁切为 4:3。可随时换成别的图片。
      # Home image: upload or pick from public/images; shown cropped to 4:3. Swap it any time.
      - { name: image, label: Home image, type: image }
      - { name: imageAlt, label: Home image — alt text (for screen readers), type: text, options: { rows: 2 } }
      - name: caption
        label: Image caption (free text; wrap a title in *asterisks* to italicize it)
        type: object
        fields:
          - { name: en, label: English, type: text, options: { rows: 2 } }
          - { name: zh, label: 中文, type: text, options: { rows: 2 } }

  # 作品：每个作品一个文件夹 content/works/<slug>/index.md。
  # Works: one folder per piece, content/works/<slug>/index.md.
  - name: works
    label: Works / 作品
    type: collection
    path: content/works
    format: yaml-frontmatter
    subfolders: true
    filename: "{fields.slug}/index.md"
    view:
      fields: [title, year, category]
      primary: title
      sort: [order, year, title]
      default:
        sort: order
        order: asc
    fields:
      - { name: title, label: Title, type: string, required: true }
      - { name: subtitle, label: Subtitle, type: string }
      - { name: year, label: Year, type: number, required: true }
      - name: category
        label: Category
        type: select
        required: true
        options:
          values: [Solo, Chamber, Orchestral, "Vocal / Choral", Arrangements, "Music Theatre", Other]
      # 多语言字段：英文必填，中文可留空。
      # Localized field: English required, Chinese optional.
      - name: instrumentation
        label: Instrumentation / 编制
        type: object
        fields:
          - { name: en, label: English, type: string, required: true }
          - { name: zh, label: 中文, type: string }
      - name: duration
        label: Duration / 时长
        type: object
        fields:
          - { name: minutes, label: Minutes, type: number }
          - { name: continuous, label: Continuous (no pause), type: boolean }
          - { name: approximate, label: Approximate, type: boolean }
      # 题献／委约只填对象本身；页面会补上 "Dedicated to …" / "Commissioned by …"。
      # Enter the recipient / commissioner only — the page prepends
      # "Dedicated to …" / "Commissioned by …" (受 … 委约) automatically.
      - name: dedication
        label: Dedication / 题献 (optional) — recipient only, e.g. "the X Orchestra"
        type: object
        fields:
          - { name: en, label: English, type: string, required: true }
          - { name: zh, label: 中文, type: string }
      - name: commission
        label: Commission / 委约 (optional) — commissioner only, e.g. "the X Foundation"
        type: object
        fields:
          - { name: en, label: English, type: string, required: true }
          - { name: zh, label: 中文, type: string }
      - name: credits
        label: Credits / 制作人员 (optional)
        type: object
        list: true
        fields:
          - { name: en, label: English, type: string, required: true }
          - { name: zh, label: 中文, type: string }
      - name: premiere
        label: Premiere / 首演 (optional)
        type: object
        fields:
          - { name: date, label: Date (e.g. 2025-04-18), type: string }
          - name: by
            label: Performers / 演出者 (e.g. "Ensemble; Conductor, conductor")
            type: object
            fields:
              - { name: en, label: English, type: string, required: true }
              - { name: zh, label: 中文, type: string }
          - name: venue
            label: Venue / 場地 (e.g. "Lang Concert Hall, Swarthmore, PA")
            type: object
            fields:
              - { name: en, label: English, type: string, required: true }
              - { name: zh, label: 中文, type: string }
      # 网址字段：要么留空，要么填写完整有效网址（schema 要求是合法 URL）。
      # URL fields: leave blank, or enter a complete valid URL (schema requires a real URL).
      - { name: recordingUrl, label: Recording URL, type: string, pattern: { regex: "^https?://.+", message: "Must be a full http(s) URL or left blank" } }
      - { name: scoreUrl, label: Score URL, type: string, pattern: { regex: "^https?://.+", message: "Must be a full http(s) URL or left blank" } }
      - { name: image, label: Cover image, type: image }
      - { name: imageAlt, label: Image alt text, type: string }
      - { name: description, label: Short description, type: text, required: true, options: { rows: 3 } }
      - { name: slug, label: Slug (folder & URL name), type: string, required: true, pattern: { regex: "^[a-z0-9-]+$", message: "Lowercase letters, numbers, and hyphens only" } }
      - { name: order, label: Order, type: number, default: 999 }
      - { name: draft, label: Draft (hidden from public index), type: boolean }
      - { name: comments, label: Open responses (comment zone) on this page, type: boolean }
      - { name: body, label: Program notes / 正文, type: rich-text }

  # 項目：每個項目一個文件夾 content/projects/<slug>/index.md。
  # Projects: one folder per project, content/projects/<slug>/index.md.
  - name: projects
    label: Projects / 項目
    type: collection
    path: content/projects
    format: yaml-frontmatter
    subfolders: true
    filename: "{fields.slug}/index.md"
    view:
      fields: [title, status, startDate]
      primary: title
      sort: [order, startDate, title]
      default:
        sort: order
        order: asc
    fields:
      - { name: title, label: Title, type: string, required: true }
      - { name: titleZh, label: 中文標題, type: string }
      - { name: subtitle, label: Subtitle, type: string }
      - { name: subtitleZh, label: 中文副標題, type: string }
      - { name: summary, label: Summary, type: text, required: true, options: { rows: 3 } }
      - { name: summaryZh, label: 中文簡介, type: text, options: { rows: 3 } }
      - name: status
        label: Status
        type: select
        required: true
        options:
          values: [planning, in-progress, complete, archived]
      - { name: startDate, label: Start date (YYYY-MM-DD), type: string, required: true }
      - { name: updated, label: Last updated (YYYY-MM-DD), type: string }
      - name: role
        label: Role / 角色
        type: object
        fields:
          - { name: en, label: English, type: string, required: true }
          - { name: zh, label: 中文, type: string }
      - name: collaborators
        label: Collaborators / 合作者
        type: object
        list: true
        fields:
          - { name: en, label: English, type: string, required: true }
          - { name: zh, label: 中文, type: string }
      - { name: topics, label: Topics, type: string, list: true }
      - name: links
        label: Links
        type: object
        list: true
        fields:
          - { name: label, label: Label, type: string, required: true }
          - { name: url, label: URL, type: string, required: true, pattern: { regex: "^https?://.+", message: "Must be a full http(s) URL" } }
      - { name: slug, label: Slug (folder & URL name), type: string, required: true, pattern: { regex: "^[a-z0-9-]+$", message: "Lowercase letters, numbers, and hyphens only" } }
      - { name: order, label: Order, type: number, default: 999 }
      - { name: featured, label: Featured project, type: boolean }
      - { name: draft, label: Draft (hidden from public index), type: boolean }
      - { name: body, label: Project notes / 項目正文, type: rich-text }

  # 文章：每篇文章一个文件夹 content/writings/<slug>/index.md。
  # Writings: one folder per piece, content/writings/<slug>/index.md.
  # 活动：每个活动一个文件夹 content/events/<slug>/index.md。
  # Events: one folder per event, content/events/<slug>/index.md.
  - name: events
    label: Events / 活动
    type: collection
    path: content/events
    format: yaml-frontmatter
    subfolders: true
    filename: "{fields.slug}/index.md"
    view:
      fields: [title, date, venue]
      primary: title
      sort: [date, order, title]
      default:
        sort: date
        order: asc
    fields:
      - { name: title, label: Title, type: string, required: true }
      - { name: date, label: Date (YYYY-MM-DD), type: string, required: true }
      - { name: time, label: Time, type: string }
      - { name: venue, label: Venue, type: string }
      - { name: location, label: Location, type: string }
      - { name: role, label: Role, type: string }
      - { name: brief, label: Brief listing text, type: text, required: true, options: { rows: 2 } }
      - { name: slug, label: Slug (folder & URL name), type: string, required: true, pattern: { regex: "^[a-z0-9-]+$", message: "Lowercase letters, numbers, and hyphens only" } }
      - { name: order, label: Order, type: number, default: 999 }
      - { name: draft, label: Draft (hidden from public index), type: boolean }
      - name: links
        label: Links
        type: object
        list: true
        fields:
          - { name: label, label: Label, type: string, required: true }
          - { name: url, label: URL, type: string, required: true, pattern: { regex: "^https?://.+", message: "Must be a full http(s) URL" } }
      - { name: body, label: Event notes / 正文, type: rich-text }

  - name: writings
    label: Writings / 文章
    type: collection
    path: content/writings
    format: yaml-frontmatter
    subfolders: true
    filename: "{fields.slug}/index.md"
    view:
      fields: [title, type, date]
      primary: title
      sort: [order, title]
      default:
        sort: order
        order: asc
    fields:
      - { name: title, label: Title, type: string, required: true }
      - { name: subtitle, label: Subtitle, type: string }
      # 日期可以是年份、年月或完整日期，例如 2024 / 2026-06 / 2026-06-17。
      # Date may be a year, year-month, or full date, e.g. 2024 / 2026-06 / 2026-06-17.
      - { name: date, label: Date (year, year-month, or full date), type: string, required: true }
      - name: type
        label: Type
        type: select
        required: true
        options:
          values: [Translation, Essay, Fiction, Blog, Poem, "Program Note", Review, Other]
      - { name: language, label: Language (e.g. English, Chinese, Chinese / English), type: string, required: true }
      - { name: excerpt, label: Excerpt, type: text, required: true, options: { rows: 3 } }
      - { name: slug, label: Slug (folder & URL name), type: string, required: true, pattern: { regex: "^[a-z0-9-]+$", message: "Lowercase letters, numbers, and hyphens only" } }
      - { name: order, label: Order, type: number, default: 999 }
      - { name: draft, label: Draft (hidden from public index), type: boolean }
      - { name: comments, label: Open responses (comment zone) on this page, type: boolean }
      - { name: body, label: Text / 正文, type: rich-text }

# 整个仓库默认操作主分支；保存即提交，触发 GitHub Actions 部署。
# Operates on the default branch; saving commits and triggers the deploy workflow.
settings:
  content:
    merge: true
