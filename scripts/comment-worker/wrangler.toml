# 中文：Cloudflare Worker 部署配置。秘密变量用 `wrangler secret put` 设置，不要写在这里。
# English: Cloudflare Worker deploy config. Set secrets with `wrangler secret put`, not here.
name = "yixincui-comments"
main = "worker.js"
compatibility_date = "2024-11-01"

[vars]
ALLOWED_ORIGIN = "https://yixincui.com"
DEFAULT_BRANCH = "main"
PENDING_BRANCH = "comment-pending"
# EMAIL_IN_ISSUE = "false"   # only set "true" if the repo is PRIVATE
